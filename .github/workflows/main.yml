name: Build and Package pyMeow

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v3

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v1
      with:
        nim-version: 'stable'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build nimlib
      run: nimble build -Y

    - name: Test nimlib
      run: nimble test -Y

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.9'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel

    - name: Build python package
      run: |
        python setup.py sdist bdist_wheel

    - name: Move nimlib into the pyMeow folder (Windows)
      if: runner.os == 'Windows'
      run: |
        Move-Item src\pyMeow.dll pyMeow\pyMeow\pyMeow.pyd

    - name: Move nimlib into the pyMeow folder (Linux)
      if: runner.os == 'Linux'
      run: |
        mv src/pyMeow.so pyMeow/pyMeow/pyMeow.so

    - name: Publish python package to Test PyPI
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      run: |
        pip install twine
        python -m twine upload --repository testpypi dist/*
