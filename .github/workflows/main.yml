name: Build and Package pyMeow

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macOS-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup nim
        uses: jiro4989/setup-nim-action@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nimble build -Y
      - run: nimble test -Y

      - name: Move nimlib into the pyMeow folder (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item src\pyMeow.dll pyMeow\pyMeow\pyMeow.pyd

      - name: Move nimlib into the pyMeow folder (Linux)
        if: runner.os == 'Linux'
        run: |
          mv src/pyMeow.so pyMeow/pyMeow/pyMeow.so

